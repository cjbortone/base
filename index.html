<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BASE</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    /* Dark mode (default) — black + white + blood red */
    --bg: #000000;
    --bg-card: #0d0d0d;
    --bg-elev: #161616;
    --bg-input: #1a1a1a;
    --fg: #e8e8e8;
    --fg-dim: #888;
    --fg-muted: #555;
    --accent: #a01818;
    --accent-fg: #ffffff;
    --border: #1f1f1f;
    --border-light: #2a2a2a;
    --danger: #ff4d3d;
    --skincare: #a01818;
    --supplement: #444;
    --workout: #a01818;
    --protocol: #444;
    --warmup-tint: rgba(160, 24, 24, 0.06);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafaf7;
      --bg-card: #ffffff;
      --bg-elev: #f0f0ed;
      --bg-input: #ffffff;
      --fg: #1a1a1a;
      --fg-dim: #666;
      --fg-muted: #999;
      --accent: #8a1010;
      --accent-fg: #ffffff;
      --border: #e0e0dc;
      --border-light: #d0d0cc;
      --danger: #c83020;
      --skincare: #8a1010;
      --supplement: #999;
      --workout: #8a1010;
      --protocol: #999;
      --warmup-tint: rgba(138, 16, 16, 0.05);
    }
  }
  html, body {
    background: var(--bg); color: var(--fg);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh; font-size: 15px; line-height: 1.5;
    overscroll-behavior: none;
  }
  body { max-width: 480px; margin: 0 auto; padding: 20px 18px 100px; }
  input, button, textarea { font-family: inherit; }

  .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .header h1 { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 800; letter-spacing: -0.04em; }
  .header .sub { font-size: 11px; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.1em; }

  .day-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--fg-dim); margin-bottom: 10px; }
  .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 16px; }
  .day-btn {
    background: var(--bg-card); border: 1px solid var(--border); color: var(--fg);
    padding: 12px 4px; border-radius: 4px; font-size: 11px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .day-btn:active { transform: scale(0.95); }
  .day-btn.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); font-weight: 700; }
  .day-btn .dot { display: block; font-size: 8px; margin-top: 3px; opacity: 0.7; }

  /* Mode toggle (lives inside workout section) */
  .mode-toggle {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px; margin-bottom: 14px;
    gap: 3px;
  }
  .mode-btn {
    background: transparent; border: none; color: var(--fg-dim);
    padding: 9px 6px; border-radius: 4px; font-size: 10px;
    font-weight: 600; cursor: pointer; text-transform: uppercase;
    letter-spacing: 0.08em; transition: all 0.15s;
    font-family: inherit;
  }
  .mode-btn:active { background: var(--bg-input); }
  .mode-btn.active { background: var(--accent); color: var(--accent-fg); }
  .mode-btn .mode-sub { display: block; font-size: 8px; font-weight: 500; margin-top: 2px; opacity: 0.7; }

  /* Skincare variant badge inside section body */
  .variant-banner {
    background: var(--bg-elev);
    border-radius: 6px;
    padding: 8px 12px;
    margin-bottom: 14px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .variant-banner.active { color: var(--accent); }
  .variant-banner.recovery { color: var(--fg-dim); }
  .variant-banner.strip { color: var(--fg-dim); }
  .variant-banner.reset { color: var(--fg-dim); }
  .variant-banner .variant-dot {
    width: 8px; height: 8px; border-radius: 50%; background: currentColor;
  }

  .day-title { margin-bottom: 20px; }
  .day-title .eyebrow { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 6px; }
  .day-title h2 { font-family: 'Fraunces', serif; font-size: 34px; font-weight: 800; line-height: 1; letter-spacing: -0.04em; }
  .day-title .summary { color: var(--fg-dim); font-size: 13px; margin-top: 8px; }

  .progress-bar { height: 3px; background: var(--border); margin-bottom: 18px; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }

  .section { margin-bottom: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .section.skincare { border-left: 3px solid var(--skincare); }
  .section.supplement { border-left: 3px solid var(--supplement); }
  .section.workout { border-left: 3px solid var(--workout); }
  .section.protocol { border-left: 3px solid var(--protocol); }
  .section.redlight { border-left: 3px solid #ff6b6b; }

  .section-head { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; gap: 8px; }
  .section-head:active { background: var(--bg-elev); }
  .section-head.open { border-bottom: 1px solid var(--border); }
  .section-head .title { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
  .section-head .phase { font-size: 9px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.1em; min-width: 30px; flex-shrink: 0; font-weight: 600; }
  .section-head h3 { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .section-head .meta { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--fg-dim); flex-shrink: 0; }
  .section-head .chev { font-size: 16px; color: var(--fg-muted); transition: transform 0.2s; }
  .section-head.open .chev { transform: rotate(90deg); }
  .section-head .checkmark { width: 18px; height: 18px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
  .section-head .checkmark.done { background: var(--accent); color: var(--accent-fg); }
  .section-head .checkmark.pending { border: 1px solid var(--fg-muted); color: transparent; }

  .section-body { display: none; padding: 0 16px 16px; }
  .section-body.open { display: block; }

  .step { padding: 12px 0; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-start; }
  .step:last-child { border-bottom: none; }
  .step-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--fg-muted); background: transparent;
    color: transparent; font-size: 12px; font-weight: 700;
    cursor: pointer; flex-shrink: 0; margin-top: 2px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .step-check.done { background: var(--accent); border-color: var(--accent); color: #000; }
  .step-body { flex: 1; min-width: 0; }
  .step-name { font-size: 14px; font-weight: 500; line-height: 1.3; margin-bottom: 3px; }
  .step-name.done { text-decoration: line-through; color: var(--fg-muted); }
  .step-detail { font-size: 12px; color: var(--fg-dim); line-height: 1.5; }
  .step-detail strong { color: var(--fg); font-weight: 500; }
  .step-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }

  .exercise { padding: 14px 0; border-bottom: 1px solid var(--border); }
  .exercise:last-child { border-bottom: none; }
  .exercise-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
  .exercise-name { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; line-height: 1.2; flex: 1; }
  .exercise-rx { background: var(--bg-elev); padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; color: var(--accent); white-space: nowrap; }
  .exercise-cue { font-size: 13px; color: var(--fg-dim); line-height: 1.55; margin-bottom: 10px; }
  .exercise-cue strong { color: var(--fg); font-weight: 500; }
  .exercise-meta { display: flex; gap: 12px; font-size: 10px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .exercise-meta span strong { color: var(--fg); font-weight: 600; }
  .exercise-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 7px 11px; background: transparent; border: 1px solid var(--border-light); color: var(--fg); font-size: 10px; text-decoration: none; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; font-weight: 500; }
  .btn:active { background: var(--bg-elev); }
  .btn-primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); font-weight: 600; }
  .btn-check { padding: 7px 14px; margin-left: auto; }
  .btn-check.done { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); font-weight: 600; }

  .sets-table { margin-top: 12px; margin-bottom: 12px; background: var(--bg-elev); border-radius: 6px; overflow: hidden; }
  .sets-header { display: grid; grid-template-columns: 36px 1fr 1fr 60px 30px; gap: 6px; padding: 8px 10px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-muted); border-bottom: 1px solid var(--border); align-items: center; }
  .set-row { display: grid; grid-template-columns: 36px 1fr 1fr 60px 30px; gap: 6px; padding: 6px 10px; align-items: center; border-bottom: 1px solid var(--border); }
  .set-row:last-child { border-bottom: none; }
  .set-row.warmup { background: rgba(217, 255, 63, 0.04); }
  .set-row.warmup + .set-row:not(.warmup) { border-top: 1px solid var(--border-light); }
  .set-num { font-size: 11px; color: var(--fg-dim); font-weight: 600; }
  .set-num.warmup-num { color: var(--accent); opacity: 0.7; font-size: 10px; }
  .set-input { background: var(--bg-input); border: 1px solid transparent; color: var(--fg); padding: 7px 8px; border-radius: 4px; font-size: 13px; width: 100%; text-align: center; font-variant-numeric: tabular-nums; }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .set-input::placeholder { color: var(--fg-muted); }
  .set-row.warmup .set-input { background: var(--warmup-tint); }
  .set-done { background: transparent; border: 1px solid var(--fg-muted); color: transparent; width: 22px; height: 22px; border-radius: 4px; font-size: 11px; cursor: pointer; justify-self: center; }
  .set-done.done { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

  .notes-input { margin-top: 8px; width: 100%; background: var(--bg-input); border: 1px solid transparent; color: var(--fg); padding: 8px 10px; border-radius: 4px; font-size: 12px; resize: none; }
  .notes-input:focus { outline: none; border-color: var(--accent); }
  .notes-input::placeholder { color: var(--fg-muted); }

  .timer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-card); border-top: 1px solid var(--border); padding: 12px 16px; display: none; align-items: center; justify-content: space-between; gap: 12px; z-index: 100; max-width: 480px; margin: 0 auto; }
  .timer-bar.active { display: flex; }
  .timer-bar.done { background: var(--accent); color: var(--accent-fg); animation: pulse 0.5s 3; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  .timer-display { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; min-width: 70px; }
  .timer-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-dim); }
  .timer-bar.done .timer-label { color: var(--accent-fg); opacity: 0.7; }
  .timer-close { background: var(--bg-elev); border: none; color: var(--fg); width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; }
  .timer-bar.done .timer-close { background: rgba(0,0,0,0.2); color: var(--accent-fg); }

  .block-head { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.15em; margin-top: 18px; margin-bottom: 4px; padding-top: 12px; border-top: 1px dashed var(--border); }
  .block-head:first-child { margin-top: 8px; border-top: none; padding-top: 0; }

  .export-bar { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
  .export-bar .btn { flex: 1; min-width: 120px; font-size: 11px; padding: 10px 12px; }

  .footer-note { margin-top: 20px; padding: 12px 14px; background: var(--bg-card); border-left: 2px solid var(--accent); font-size: 11px; color: var(--fg-dim); line-height: 1.5; }
  .footer-note strong { color: var(--fg); }

  .day-type-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-left: 8px; }
  .day-type-badge.active { background: rgba(255,107,107,0.15); color: #ff6b6b; border: 1px solid #ff6b6b; }
  .day-type-badge.recovery { background: rgba(158,207,255,0.15); color: var(--supplement); border: 1px solid var(--supplement); }
  .day-type-badge.reset { background: rgba(197,163,255,0.15); color: var(--protocol); border: 1px solid var(--protocol); }

  /* Tab nav */
  .tab-nav {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px; margin-bottom: 20px;
  }
  .tab-btn {
    background: transparent; border: none; color: var(--fg-dim);
    padding: 10px; border-radius: 4px; font-size: 11px; font-weight: 600;
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em;
    font-family: inherit;
  }
  .tab-btn:active { background: var(--bg-elev); }
  .tab-btn.active { background: var(--accent); color: var(--accent-fg); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Quick log bar */
  .quicklog {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px; margin-bottom: 16px;
  }
  .quicklog-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--fg-dim); margin-bottom: 10px;
  }
  .quicklog-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
  }
  .quicklog-grid.four { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .quicklog-field { display: flex; flex-direction: column; gap: 4px; }
  .quicklog-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--fg-muted); font-weight: 600;
  }
  .quicklog-input {
    background: var(--bg-input); border: 1px solid transparent; color: var(--fg);
    padding: 10px 8px; border-radius: 4px; font-size: 16px; font-weight: 600;
    width: 100%; text-align: center; font-variant-numeric: tabular-nums;
    font-family: inherit;
  }
  .quicklog-input:focus { outline: none; border-color: var(--accent); }
  .quicklog-input::placeholder { color: var(--fg-muted); font-weight: 400; }
  .quicklog-save {
    margin-top: 10px; width: 100%; background: var(--accent); color: var(--accent-fg);
    border: none; padding: 10px; border-radius: 4px; font-size: 11px;
    font-weight: 700; cursor: pointer; text-transform: uppercase;
    letter-spacing: 0.1em; font-family: inherit;
  }
  .quicklog-saved {
    font-size: 10px; color: var(--fg-muted); margin-top: 8px; text-align: center;
  }
  .quicklog-saved.just { color: var(--accent); }

  /* Drink counter */
  .drink-counter {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-top: 12px; padding: 10px; background: var(--bg-input);
    border-radius: 6px;
  }
  .drink-count { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 40px; text-align: center; }
  .drink-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-muted); }
  .drink-btn {
    background: var(--bg-elev); border: 1px solid var(--border-light); color: var(--fg);
    width: 36px; height: 36px; border-radius: 50%; font-size: 18px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .drink-btn:active { background: var(--accent); color: var(--accent-fg); }

  /* Metrics module */
  .metrics-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 14px;
  }
  .metrics-card h3 {
    font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600;
    margin-bottom: 12px; letter-spacing: -0.02em;
  }
  .metrics-card .sub { font-size: 11px; color: var(--fg-dim); margin-bottom: 14px; }

  /* Chart */
  .chart-wrap { margin: 14px 0; }
  .chart { width: 100%; height: 180px; display: block; background: var(--bg-elev); border-radius: 4px; }
  .chart-legend {
    display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px;
    font-size: 10px; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.05em;
  }
  .chart-legend span { display: flex; align-items: center; gap: 5px; }
  .chart-legend .dot { width: 10px; height: 2px; background: var(--accent); border-radius: 1px; }
  .chart-legend .dot.dashed { background: repeating-linear-gradient(to right, var(--fg-muted) 0 3px, transparent 3px 6px); }
  .chart-legend .dot.milestone-1 { background: var(--fg-muted); }
  .chart-legend .dot.milestone-2 { background: var(--fg-dim); }
  .chart-legend .dot.milestone-3 { background: var(--accent); }

  .milestone-list {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px;
  }
  .milestone {
    background: var(--bg-elev); padding: 10px 8px; border-radius: 6px;
    text-align: center; border: 1px solid transparent;
  }
  .milestone.hit { border-color: var(--accent); }
  .milestone-weight { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .milestone-label { font-size: 8px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-muted); margin-top: 2px; }

  /* Measurements grid */
  .measurements-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .measurement-field { display: flex; flex-direction: column; gap: 4px; }

  /* History table */
  .history-table {
    width: 100%; font-size: 12px; border-collapse: collapse; margin-top: 8px;
  }
  .history-table th {
    text-align: left; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--fg-muted); font-weight: 600; padding: 6px 4px; border-bottom: 1px solid var(--border);
  }
  .history-table td {
    padding: 8px 4px; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums;
  }
  .history-table td.num { text-align: right; font-weight: 500; }
  .history-empty { text-align: center; color: var(--fg-muted); padding: 20px; font-size: 12px; }

  /* Weekly view */
  .week-hero {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 14px;
  }
  .week-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--fg-dim); }
  .week-title { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 700; letter-spacing: -0.03em; margin: 4px 0; }
  .week-range { font-size: 12px; color: var(--fg-dim); }
  .week-nav { display: flex; gap: 6px; margin-top: 10px; }
  .week-nav .btn { flex: 1; }

  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px;
  }
  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px;
  }
  .stat-card .label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-muted); font-weight: 600; }
  .stat-card .value { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 4px; }
  .stat-card .delta { font-size: 11px; margin-top: 2px; }
  .stat-card .delta.good { color: var(--accent); }
  .stat-card .delta.bad { color: var(--danger); }
  .stat-card .detail { font-size: 11px; color: var(--fg-dim); margin-top: 4px; }

  .day-bars {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    margin-top: 14px;
  }
  .day-bar {
    background: var(--bg-elev); border-radius: 4px; padding: 8px 4px;
    text-align: center; border: 1px solid var(--border);
  }
  .day-bar.workout-done { border-color: var(--accent); background: rgba(217,255,63,0.06); }
  .day-bar.skipped { opacity: 0.4; }
  .day-bar .d { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--fg-muted); }
  .day-bar .v { font-size: 14px; font-weight: 600; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .day-bar .u { font-size: 8px; color: var(--fg-muted); text-transform: uppercase; }
</style>

function parseRest(s) {
  if (!s) return null;
  const str = s.toLowerCase();
  if (str.includes('ss')) return 0;
  const rMin = str.match(/(\d+\.?\d*)\s*-\s*(\d+\.?\d*)\s*min/);
  if (rMin) return Math.round(parseFloat(rMin[1]) * 60);
  const rSec = str.match(/(\d+)\s*-\s*(\d+)\s*s/);
  if (rSec) return parseInt(rSec[1]);
  const min = str.match(/(\d+\.?\d*)\s*min/);
  if (min) return Math.round(parseFloat(min[1]) * 60);
  const sec = str.match(/(\d+)\s*s/);
  if (sec) return parseInt(sec[1]);
  return null;
}

function parseSets(rx) {
  if (!rx) return 0;
  const m = rx.match(/(\d+)\s*×/);
  return m ? parseInt(m[1]) : 0;
}

// Parse target reps from Rx. Returns a string (could be a number or "AMRAP"/"Failure"/"8-10")
function parseTargetReps(rx) {
  if (!rx) return '';
  // Take everything after the × sign
  const m = rx.match(/×\s*(.+?)(?:\s*\/|$)/);
  if (!m) return '';
  const raw = m[1].trim();
  // Keep AMRAP/Failure/ranges as-is (user will likely fill in what they hit)
  if (/AMRAP|Failure/i.test(raw)) return '';
  // Range like "12-15" → use the lower end as the target
  const range = raw.match(/(\d+)\s*-\s*(\d+)/);
  if (range) return range[1];
  // Single number
  const single = raw.match(/^(\d+)$/);
  if (single) return single[1];
  return '';
}

function demoLink(name) {
  return `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(name + ' exercise form gif')}`;
}

// ============ DAY TIMELINE ============

function getSkincareAM(skinType) {
  return skinType === 'active' ? SKIN_AM_ACTIVE : SKIN_AM_LIGHT;
}

function getSkincarePM(skinType) {
  if (skinType === 'active') return SKIN_PM_ACTIVE;
  if (skinType === 'strip') return SKIN_PM_STRIP;
  if (skinType === 'recovery') return SKIN_PM_RECOVERY;
  if (skinType === 'reset') return SKIN_PM_RESET;
  return SKIN_PM_RECOVERY;
}

function buildDayTimeline(dayKey, mode) {
  const day = DAYS.find(d => d.key === dayKey);
  const blocks = [];

  blocks.push(AM_PROTOCOL);
  blocks.push(SUPP_AM);
  blocks.push(RED_LIGHT);

  if (day.type === 'lift') {
    blocks.push(SUPP_PREGYM);
    // Warm-up (only for full and home modes; quick skips the warm-up block)
    if (mode !== 'quick') {
      if (dayKey === 'mon') blocks.push(WARMUP_UPPER);
      if (dayKey === 'wed') blocks.push(WARMUP_PUSH);
      if (dayKey === 'fri') blocks.push(WARMUP_LEGS);
    }
    const workout = getWorkoutBlock(dayKey, mode);
    if (workout) blocks.push(workout);
  } else if (day.type === 'mobility') {
    if (dayKey === 'tue') blocks.push(TUE_MOBILITY);
    if (dayKey === 'thu') blocks.push(THU_MOBILITY);
  } else {
    blocks.push({
      title: day.name === 'Walk' ? 'Walk' : 'Rest',
      phase: 'DAY', type: 'workout',
      steps: day.name === 'Walk' ?
        [{ name: 'Walk 30-60 min outside', detail: 'Recovery-focused movement.' }] :
        [{ name: 'Light walking only', detail: 'Recovery day. Sleep 8+ hrs tonight.' }],
    });
  }

  blocks.push(getSkincareAM(day.skinType));
  blocks.push(SUPP_LUNCH);
  blocks.push(PM_PROTOCOL);
  blocks.push(SUPP_BED);
  blocks.push(getSkincarePM(day.skinType));

  return blocks;
}

function getDailyLog(dateStr) {

  }
  // Backfill new fields on existing logs
  const log = metrics.dailyLogs[dateStr];
  if (log.fat === undefined) log.fat = '';
  if (log.carbs === undefined) log.carbs = '';
  if (log.sodium === undefined) log.sodium = '';

function getStepKey(dayKey, sectionIdx, stepIdx) {

function getExKey(dayKey, sectionIdx, blockIdx, exIdx) {

  return `${dayKey}_${currentMode}_${base}`;

function initExState(exId, exercise) {
  if (!state[currentDay]) state[currentDay] = {};
  if (!state[currentDay][exId]) {
    const sets = [];
    if (exercise?.warmups) {
      exercise.warmups.forEach(w => {
        sets.push({ weight: String(w.weight), reps: String(w.reps), rpe: '', done: false, isWarmup: true });
      });
    }
    const setCount = parseSets(exercise?.rx || '');
    const wt = exercise?.workingWeight;
    const defaultWt = (wt != null && wt !== 'BW' && wt !== 'Band') ? String(wt) : '';
    const defaultReps = parseTargetReps(exercise?.rx || '');
    for (let i = 0; i < setCount; i++) {
      sets.push({ weight: defaultWt, reps: defaultReps, rpe: '', done: false, isWarmup: false });
    }
    state[currentDay][exId] = { done: false, sets, notes: '' };
  }
  return state[currentDay][exId];
}

// ============ TIMER ============
let timerInterval = null, timerRemaining = 0, timerPaused = false, timerBeep = null;

function createBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    return () => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
      osc.start(); osc.stop(ctx.currentTime + 0.5);
    };
  } catch (e) { return () => {}; }
}

function startTimer(seconds, label) {
  if (!timerBeep) timerBeep = createBeep();
  stopTimer();
  timerRemaining = seconds;
  timerPaused = false;
  document.getElementById('timerLabel').textContent = label || 'Timer';
  document.getElementById('timerToggle').textContent = 'Pause';
  document.getElementById('timerBar').classList.add('active');
  document.getElementById('timerBar').classList.remove('done');
  updateTimerDisplay();
  timerInterval = setInterval(tickTimer, 1000);
}
function tickTimer() {
  if (timerPaused) return;
  timerRemaining--;
  updateTimerDisplay();
  if (timerRemaining <= 0) {
    clearInterval(timerInterval);
    document.getElementById('timerBar').classList.add('done');
    document.getElementById('timerDisplay').textContent = 'DONE';
    try { timerBeep(); setTimeout(timerBeep, 600); setTimeout(timerBeep, 1200); } catch(e){}
    if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
  }
}
function updateTimerDisplay() {
  const m = Math.floor(Math.max(0, timerRemaining) / 60);
  const s = Math.max(0, timerRemaining) % 60;
  document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
}
function toggleTimer() {
  timerPaused = !timerPaused;
  document.getElementById('timerToggle').textContent = timerPaused ? 'Resume' : 'Pause';
}
function addTime(sec) {
  timerRemaining += sec;
  if (document.getElementById('timerBar').classList.contains('done')) {
    document.getElementById('timerBar').classList.remove('done');
    clearInterval(timerInterval);
    timerInterval = setInterval(tickTimer, 1000);
  }
  updateTimerDisplay();
}
function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('timerBar').classList.remove('active');
  document.getElementById('timerBar').classList.remove('done');
}

function renderSection(block, sectionIdx) {
  const sectionId = `${currentDay}_${currentMode}_s${sectionIdx}`;
  const itemIds = [];
  let body = '';

  // Inject mode toggle at top of workout section body (lift days only)
  const day = DAYS.find(d => d.key === currentDay);
  const isWorkoutSection = block.type === 'workout' && day.type === 'lift' && block.phase === 'GYM' && block.blocks;
  if (isWorkoutSection) {
    body += renderModeToggleInline();
  }

  // Inject variant banner at top of skincare section body
  if (block.type === 'skincare' && block.variant) {
    const variantClass =
      block.variant === 'ACTIVE' || block.variant === 'ACTIVE NIGHT' ? 'active' :
      block.variant === 'STRIP + TOOLS' ? 'strip' :
      block.variant === 'RECOVERY + TOOLS' ? 'recovery' :
      block.variant === 'EXFOLIATION' ? 'reset' :
      block.variant === 'LIGHT' ? 'recovery' : '';
    body += `<div class="variant-banner ${variantClass}"><span class="variant-dot"></span>${block.variant} Night</div>`;
  }

  if (block.blocks) {
    block.blocks.forEach((sub, bi) => {
      body += `<div class="block-head">${sub.name}</div>`;
      sub.exercises.forEach((ex, ei) => {
        const exId = getExKey(currentDay, sectionIdx, bi, ei);
        itemIds.push(exId);
        body += renderExercise(ex, exId);
      });
    });
  } else if (block.exercises) {
    block.exercises.forEach((ex, ei) => {
      const exId = getExKey(currentDay, sectionIdx, null, ei);
      itemIds.push(exId);
      body += renderExercise(ex, exId);
    });
  } else if (block.steps) {
    block.steps.forEach((step, si) => {
      const stepId = getStepKey(currentDay, sectionIdx, si);
      itemIds.push(stepId);
      body += renderStep(step, stepId);
    });
  }

  const completedCount = itemIds.filter(id => state[currentDay]?.[id]?.done).length;
  const allDone = itemIds.length > 0 && completedCount === itemIds.length;

  const typeClass = block.type || '';

  return `
    <div class="section ${typeClass}" data-section="${sectionId}">
      <div class="section-head" data-toggle="${sectionId}">
        <div class="title">
          <span class="phase">${block.phase || ''}</span>
          <h3>${block.title}</h3>
        </div>
        <div class="meta">
          ${block.duration ? `<span>${block.duration}</span>` : ''}
          <span data-count="${sectionId}">${completedCount}/${itemIds.length}</span>
          <span class="checkmark ${allDone ? 'done' : 'pending'}" data-sectioncheck="${sectionId}">${allDone ? '✓' : ''}</span>
          <span class="chev">›</span>
        </div>
      </div>
      <div class="section-body" data-body="${sectionId}">${body}</div>
    </div>
  `;
}

function renderStep(step, stepId) {
  if (!state[currentDay]) state[currentDay] = {};
  if (!state[currentDay][stepId]) state[currentDay][stepId] = { done: false };
  const done = state[currentDay][stepId].done;

  const timerBtn = step.timer ? `<button class="btn" data-timer="${step.timer}" data-timerlabel="${step.name}">⏱ Timer</button>` : '';

  return `
    <div class="step" data-step="${stepId}">
      <button class="step-check ${done ? 'done' : ''}" data-check="${stepId}">${done ? '✓' : ''}</button>
      <div class="step-body">
        <div class="step-name ${done ? 'done' : ''}">${step.name}</div>
        ${step.detail ? `<div class="step-detail">${step.detail}</div>` : ''}
        ${timerBtn ? `<div class="step-actions">${timerBtn}</div>` : ''}
      </div>
    </div>
  `;
}

function renderExercise(ex, exId) {
  const restSec = parseRest(ex.rest);
  const hasWarmups = ex.warmups && ex.warmups.length > 0;
  const setCount = parseSets(ex.rx);
  const tracking = ex.track && (setCount > 0 || hasWarmups);
  if (tracking) initExState(exId, ex);
  const exState = state[currentDay]?.[exId] || {};
  const done = exState.done;

  const rpe = ex.rpe ? `<span>RPE <strong>${ex.rpe}</strong></span>` : '';
  const rest = ex.rest ? `<span>REST <strong>${ex.rest}</strong></span>` : '';

  let setsHtml = '';
  if (tracking) {
    let warmupIdx = 0, workingIdx = 0;
    setsHtml = `
      <div class="sets-table">
        <div class="sets-header"><div>#</div><div>WEIGHT</div><div>REPS</div><div>RPE</div><div>✓</div></div>
        ${(exState.sets || []).map((s, i) => {
          let label;
          if (s.isWarmup) { warmupIdx++; label = `<span class="set-num warmup-num">W${warmupIdx}</span>`; }
          else { workingIdx++; label = `<span class="set-num">${workingIdx}</span>`; }
          return `
            <div class="set-row ${s.isWarmup ? 'warmup' : ''}">
              <div>${label}</div>
              <input class="set-input" type="text" inputmode="decimal" placeholder="–" value="${s.weight}" data-setfield="${exId}|${i}|weight">
              <input class="set-input" type="text" inputmode="numeric" placeholder="–" value="${s.reps}" data-setfield="${exId}|${i}|reps">
              <input class="set-input" type="text" inputmode="decimal" placeholder="–" value="${s.rpe}" data-setfield="${exId}|${i}|rpe">
              <button class="set-done ${s.done ? 'done' : ''}" data-setdone="${exId}|${i}">${s.done ? '✓' : ''}</button>
            </div>
          `;
        }).join('')}
      </div>
      <textarea class="notes-input" rows="1" placeholder="Notes..." data-notes="${exId}">${exState.notes || ''}</textarea>
    `;
  }

  const timerBtn = restSec ? `<button class="btn" data-timer="${restSec}" data-timerlabel="${ex.name}">⏱ ${ex.rest}</button>` : '';

  return `
    <div class="exercise" data-exercise="${exId}">
      <div class="exercise-head">
        <div class="exercise-name">${ex.name}</div>
        <div class="exercise-rx">${ex.rx}</div>
      </div>
      <div class="exercise-cue">${ex.cue}</div>
      ${(rpe || rest) ? `<div class="exercise-meta">${rpe}${rest}</div>` : ''}
      ${setsHtml}
      <div class="exercise-actions">
        <a class="btn" href="${demoLink(ex.name)}" target="_blank" rel="noopener">▶ Demo</a>
        ${timerBtn}
        <button class="btn btn-check ${done ? 'done' : ''}" data-check="${exId}">${done ? '✓ Done' : 'Mark Done'}</button>
      </div>
    </div>
  `;
}

function renderProgress() {
  const timeline = buildDayTimeline(currentDay, currentMode);
  let total = 0, done = 0;
  timeline.forEach((block, si) => {
    if (block.blocks) {
      block.blocks.forEach((sub, bi) => {
        sub.exercises.forEach((ex, ei) => {
          total++;
          if (state[currentDay]?.[getExKey(currentDay, si, bi, ei)]?.done) done++;
        });
      });
    } else if (block.exercises) {
      block.exercises.forEach((ex, ei) => {
        total++;
        if (state[currentDay]?.[getExKey(currentDay, si, null, ei)]?.done) done++;
      });
    } else if (block.steps) {
      block.steps.forEach((step, stepIdx) => {
        total++;
        if (state[currentDay]?.[getStepKey(currentDay, si, stepIdx)]?.done) done++;
      });
    }
  });
  document.getElementById('progressFill').style.width = (total > 0 ? (done/total)*100 : 0) + '%';
}

function updateSectionStatus(sectionId) {
  const section = document.querySelector(`[data-section="${sectionId}"]`);
  if (!section) return;
  const checks = section.querySelectorAll('[data-check]');
  const doneChecks = section.querySelectorAll('[data-check].done');
  const countEl = section.querySelector(`[data-count="${sectionId}"]`);
  const checkmark = section.querySelector(`[data-sectioncheck="${sectionId}"]`);
  if (countEl) countEl.textContent = `${doneChecks.length}/${checks.length}`;
  if (checkmark) {
    if (doneChecks.length === checks.length && checks.length > 0) {
      checkmark.classList.add('done'); checkmark.classList.remove('pending'); checkmark.textContent = '✓';
    } else {
      checkmark.classList.add('pending'); checkmark.classList.remove('done'); checkmark.textContent = '';
    }
  }
}

function attachHandlers() {
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.onclick = () => {
      const id = el.getAttribute('data-toggle');
      const body = document.querySelector(`[data-body="${id}"]`);
      el.classList.toggle('open');
      body.classList.toggle('open');
    };
  });

  // Inline mode toggle (inside workout section)
  document.querySelectorAll('[data-modetoggle] .mode-btn').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const newMode = el.getAttribute('data-mode');
      if (newMode !== currentMode) {
        // Remember which sections are currently open by their title (since IDs include mode)
        const openTitles = new Set();
        document.querySelectorAll('[data-tabcontent="today"] .section-head.open').forEach(head => {
          const title = head.querySelector('h3')?.textContent || '';
          openTitles.add(title);
        });
        currentMode = newMode;
        renderDayContent();
        // Re-open sections whose title matches
        document.querySelectorAll('[data-tabcontent="today"] .section-head').forEach(head => {
          const title = head.querySelector('h3')?.textContent || '';
          if (openTitles.has(title)) {
            head.classList.add('open');
            const id = head.getAttribute('data-toggle');
            const body = document.querySelector(`[data-body="${id}"]`);
            if (body) body.classList.add('open');
          }
        });
      }
    };
  });

  document.querySelectorAll('[data-check]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const id = el.getAttribute('data-check');
      if (!state[currentDay]) state[currentDay] = {};
      if (!state[currentDay][id]) state[currentDay][id] = { done: false };
      state[currentDay][id].done = !state[currentDay][id].done;
      const done = state[currentDay][id].done;
      el.classList.toggle('done', done);
      if (el.classList.contains('step-check')) {
        el.textContent = done ? '✓' : '';
        const nameEl = el.parentElement.querySelector('.step-name');
        if (nameEl) nameEl.classList.toggle('done', done);
        if (done) {
          const timerBtn = el.parentElement.querySelector('[data-timer]');
          if (timerBtn) {
            const sec = parseInt(timerBtn.getAttribute('data-timer'));
            const label = timerBtn.getAttribute('data-timerlabel') || 'Timer';
            if (sec > 0) startTimer(sec, label);
          }
        }
      } else {
        el.textContent = done ? '✓ Done' : 'Mark Done';
      }
      const section = el.closest('[data-section]');
      if (section) updateSectionStatus(section.getAttribute('data-section'));
      renderProgress();
      saveState();
    };
  });

  document.querySelectorAll('[data-setdone]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const [exId, idxStr] = el.getAttribute('data-setdone').split('|');
      const idx = parseInt(idxStr);
      const setState = state[currentDay][exId].sets[idx];
      setState.done = !setState.done;
      el.classList.toggle('done', setState.done);
      el.textContent = setState.done ? '✓' : '';
      if (setState.done) {
        const exEl = el.closest('[data-exercise]');
        const exName = exEl?.querySelector('.exercise-name')?.textContent || 'Set';
        if (setState.isWarmup) {
          // Warm-up set: short transition timer
          startTimer(15, `Warm-up reset · ${exName}`);
        } else {
          // Working set: use prescribed rest from the timer button, or default to 90s
          const timerBtn = exEl?.querySelector('[data-timer]');
          let sec = 90;
          if (timerBtn) {
            const parsed = parseInt(timerBtn.getAttribute('data-timer'));
            if (parsed > 0) sec = parsed;
          }
          startTimer(sec, `Rest · ${exName}`);
        }
      }
      saveState();
    };
  });

  document.querySelectorAll('[data-setfield]').forEach(el => {
    el.oninput = () => {
      const [exId, idxStr, field] = el.getAttribute('data-setfield').split('|');
      const idx = parseInt(idxStr);
      if (state[currentDay]?.[exId]?.sets?.[idx]) {
        state[currentDay][exId].sets[idx][field] = el.value;
        saveState();
      }
    };
  });

  document.querySelectorAll('[data-notes]').forEach(el => {
    el.oninput = () => {
      const exId = el.getAttribute('data-notes');
      if (state[currentDay]?.[exId]) {
        state[currentDay][exId].notes = el.value;
        saveState();
      }
    };
  });

  document.querySelectorAll('[data-timer]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const sec = parseInt(el.getAttribute('data-timer'));
      const label = el.getAttribute('data-timerlabel') || 'Timer';
      if (sec > 0) startTimer(sec, label);
    };
  });
}

function buildDayRows(dayKey) {
  const rows = [];
  const date = new Date().toISOString().slice(0, 10);
  const dayName = DAYS.find(d => d.key === dayKey).name;
  const timeline = buildDayTimeline(dayKey, currentMode);

  // Day-level summary rows first (weight, macros, drinks, notes)
  const dailyLog = metrics.dailyLogs[date] || {};
  const todaysWeight = metrics.weights.find(w => w.date === date);
  const summaries = [
    { item: 'Weight (lb)', value: todaysWeight ? todaysWeight.weight : '' },
    { item: 'Calories', value: dailyLog.calories || '' },
    { item: 'Protein (g)', value: dailyLog.protein || '' },
    { item: 'Fat (g)', value: dailyLog.fat || '' },
    { item: 'Carbs (g)', value: dailyLog.carbs || '' },
    { item: 'Sodium (mg)', value: dailyLog.sodium || '' },
    { item: 'Drinks', value: dailyLog.drinks || 0 },
    { item: 'Day Notes', value: dailyLog.notes || '' },
  ];
  summaries.forEach(s => {
    rows.push({
      date, day: dayName, mode: currentMode, section: 'Daily Summary', item: s.item,
      prescription: '', set: '', is_warmup: '', weight: '', reps: '', rpe: '',
      set_done: '', item_done: '', notes: String(s.value)
    });
  });

  timeline.forEach((block, si) => {
    const sectionName = block.title + (block.variant ? ` (${block.variant})` : '');

    if (block.blocks) {
      block.blocks.forEach((sub, bi) => {
        sub.exercises.forEach((ex, ei) => {
          const exId = getExKey(dayKey, si, bi, ei);
          const exState = state[dayKey]?.[exId];
          const done = exState?.done ? 'YES' : 'NO';
          if (exState?.sets?.length > 0 && ex.track) {
            exState.sets.forEach((s, i) => {
              rows.push({
                date, day: dayName, mode: currentMode, section: `${sectionName} · ${sub.name}`, item: ex.name,
                prescription: ex.rx, set: (s.isWarmup ? `W${i+1}` : i + 1 - (ex.warmups?.length || 0)),
                is_warmup: s.isWarmup ? 'YES' : 'NO',
                weight: s.weight || '', reps: s.reps || '', rpe: s.rpe || '',
                set_done: s.done ? 'YES' : 'NO', item_done: done,
                notes: i === 0 ? (exState.notes || '') : ''
              });
            });
          }
        });
      });
    } else if (block.steps) {
      block.steps.forEach((step, stepIdx) => {
        const stepId = getStepKey(dayKey, si, stepIdx);
        const stepState = state[dayKey]?.[stepId];
        rows.push({
          date, day: dayName, mode: currentMode, section: sectionName, item: step.name,
          prescription: '', set: '', is_warmup: '', weight: '', reps: '', rpe: '',
          set_done: '', item_done: stepState?.done ? 'YES' : 'NO', notes: step.detail || ''
        });
      });
    }
  });
  return rows;
}

function rowsToCsv(rows) {
  if (rows.length === 0) return '';
  const headers = Object.keys(rows[0]);
  const escape = v => {
    const s = String(v == null ? '' : v);
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const lines = [headers.join(',')];
  rows.forEach(r => lines.push(headers.map(h => escape(r[h])).join(',')));
  return lines.join('\n');
}

function downloadCsv(filename, csv) {
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportDay() {
  const rows = buildDayRows(currentDay);
  if (rows.length === 0) { alert('Nothing to export.'); return; }
  const date = new Date().toISOString().slice(0, 10);
  const dayName = DAYS.find(d => d.key === currentDay).name.replace(/\W/g, '');
  downloadCsv(`base_${date}_${dayName}_${currentMode}.csv`, rowsToCsv(rows));
}

function exportAll() {
  const allRows = [];
  DAYS.forEach(d => { if (state[d.key]) allRows.push(...buildDayRows(d.key)); });
  if (allRows.length === 0) { alert('Nothing tracked yet.'); return; }
  const date = new Date().toISOString().slice(0, 10);
  downloadCsv(`base_all_${date}.csv`, rowsToCsv(allRows));
}

// ============ METRICS TAB ============
function rollingAverage(arr, key, days) {
  if (arr.length === 0) return [];
  const result = [];
  const sorted = [...arr].sort((a, b) => a.date.localeCompare(b.date));
  for (let i = 0; i < sorted.length; i++) {
    const end = i;
    const start = Math.max(0, i - days + 1);
    const slice = sorted.slice(start, end + 1);
    const avg = slice.reduce((s, x) => s + x[key], 0) / slice.length;
    result.push({ date: sorted[i].date, value: avg });
  }
  return result;
}

function navyBodyFat(weight_lb, waist_in, neck_in, height_in) {
  // Navy method for males
  if (!weight_lb || !waist_in || !neck_in || !height_in) return null;
  if (waist_in - neck_in <= 0) return null;
  const bf = 86.010 * Math.log10(waist_in - neck_in) - 70.041 * Math.log10(height_in) + 36.76;
  return Math.max(3, Math.min(60, bf));
}

function leanMass(weight_lb, bf_pct) {
  if (!weight_lb || bf_pct == null) return null;
  return weight_lb * (1 - bf_pct / 100);
}

function latestMeasurement() {
  if (metrics.measurements.length === 0) return null;
  return [...metrics.measurements].sort((a, b) => b.date.localeCompare(a.date))[0];
}

function latestWeight() {
  if (metrics.weights.length === 0) return null;
  return [...metrics.weights].sort((a, b) => b.date.localeCompare(a.date))[0];
}

  // Milestones
  const milestones = metrics.config.milestones;
  const milestonesHtml = milestones.map((m, i) => {
    const hit = latestAvg != null && latestAvg <= m;

  if (lm && latest) {

function saveMeasurements() {
  const fields = ['waist', 'chest', 'arms', 'thighs', 'hips', 'neck'];
  const entry = { date: todayStr() };
  let hasAny = false;
  fields.forEach(f => {
    const v = parseFloat(document.getElementById('mm-' + f).value);
    if (!isNaN(v)) { entry[f] = v; hasAny = true; }
  });
  if (!hasAny) { alert('Enter at least one measurement.'); return; }
  // Replace same-day entry or add new
  const existing = metrics.measurements.findIndex(x => x.date === entry.date);
  if (existing >= 0) metrics.measurements[existing] = entry;
  else metrics.measurements.push(entry);
  metrics.measurements.sort((a, b) => a.date.localeCompare(b.date));
  saveMetrics();
  renderMetrics();
}

function drawWeightChart() {
  const canvas = document.getElementById('weightChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  // Match canvas size to actual displayed size
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);

  // Read theme colors from CSS vars
  const cs = getComputedStyle(document.documentElement);
  const c = {
    bg: cs.getPropertyValue('--bg-elev').trim() || '#161616',
    grid: cs.getPropertyValue('--border').trim() || '#1f1f1f',
    muted: cs.getPropertyValue('--fg-muted').trim() || '#555',
    dim: cs.getPropertyValue('--fg-dim').trim() || '#888',
    accent: cs.getPropertyValue('--accent').trim() || '#a01818',
  };

  const W = rect.width, H = rect.height;
  const pad = { t: 12, r: 12, b: 22, l: 36 };
  const plotW = W - pad.l - pad.r, plotH = H - pad.t - pad.b;

  ctx.fillStyle = c.bg;
  ctx.fillRect(0, 0, W, H);

  const weights = metrics.weights;
  const rolling = rollingAverage(weights, 'weight', 7);
  const milestones = metrics.config.milestones;

  // Y range: max of start+2 and current+2; min of target-2
  let yMax = 220, yMin = 180;
  if (weights.length > 0) {
    const ws = weights.map(x => x.weight);
    yMax = Math.max(...ws, metrics.config.startWeight || 215) + 3;
    yMin = Math.min(...ws, 183) - 2;
  }
  const y2px = y => pad.t + ((yMax - y) / (yMax - yMin)) * plotH;

  // Grid
  ctx.strokeStyle = c.grid;
  ctx.lineWidth = 1;
  ctx.font = '9px JetBrains Mono, monospace';
  ctx.fillStyle = c.muted;
  for (let y = Math.ceil(yMin/5)*5; y <= yMax; y += 5) {
    const py = y2px(y);
    ctx.beginPath(); ctx.moveTo(pad.l, py); ctx.lineTo(W - pad.r, py); ctx.stroke();
    ctx.fillText(y, 4, py + 3);
  }

  // Milestone lines
  const milestoneColors = [c.muted, c.dim, c.accent];
  milestones.forEach((m, i) => {
    if (m < yMin || m > yMax) return;
    const py = y2px(m);
    ctx.strokeStyle = milestoneColors[i];
    ctx.setLineDash([4, 4]);
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.l, py); ctx.lineTo(W - pad.r, py); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = milestoneColors[i];
    ctx.font = '9px JetBrains Mono, monospace';
    ctx.fillText(m, W - pad.r - 20, py - 3);
  });

  if (weights.length === 0) {
    ctx.fillStyle = c.muted;
    ctx.font = '12px JetBrains Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('No data yet', W / 2, H / 2);
    ctx.textAlign = 'left';
    return;
  }

  // X range
  const sortedWeights = [...weights].sort((a, b) => a.date.localeCompare(b.date));
  const first = new Date(sortedWeights[0].date);
  const last = new Date(sortedWeights[sortedWeights.length - 1].date);
  const todayD = new Date(todayStr());
  const spanEnd = todayD > last ? todayD : last;
  // Always span at least 14 days
  let spanStart = new Date(first);
  const daysSpan = (spanEnd - spanStart) / 86400000;
  if (daysSpan < 14) spanStart = new Date(spanEnd.getTime() - 14 * 86400000);

  const totalDays = Math.max(1, (spanEnd - spanStart) / 86400000);
  const x2px = d => pad.l + ((new Date(d) - spanStart) / 86400000 / totalDays) * plotW;

  // Dots for daily
  ctx.fillStyle = c.dim;
  weights.forEach(w => {
    ctx.beginPath();
    ctx.arc(x2px(w.date), y2px(w.weight), 2, 0, Math.PI * 2);
    ctx.fill();
  });

  // 7-day avg line
  if (rolling.length > 1) {
    ctx.strokeStyle = c.accent;
    ctx.lineWidth = 2;
    ctx.beginPath();
    rolling.forEach((p, i) => {
      const px = x2px(p.date), py = y2px(p.value);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    });
    ctx.stroke();
  }

  // X labels (first and last date)
  ctx.fillStyle = c.muted;
  ctx.font = '9px JetBrains Mono, monospace';
  ctx.textAlign = 'left';
  ctx.fillText(sortedWeights[0].date.slice(5), pad.l, H - 6);
  ctx.textAlign = 'right';
  ctx.fillText(todayStr().slice(5), W - pad.r, H - 6);
  ctx.textAlign = 'left';
}

// ============ WEEKLY VIEW ============
// Week is Monday-Sunday
let weekOffset = 0; // 0 = current week, -1 = last week, etc.

function getWeekStart(offset = 0) {
  const now = new Date();
  const day = now.getDay(); // 0=Sun, 1=Mon...
  const daysToMonday = day === 0 ? -6 : 1 - day;
  const monday = new Date(now);
  monday.setDate(now.getDate() + daysToMonday + (offset * 7));
  monday.setHours(0, 0, 0, 0);
  return monday;
}

function renderWeekly() {
  const container = document.getElementById('weeklyContent');
  if (!container) return;

  const weekStart = getWeekStart(weekOffset);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 6);

  const weekLabel = weekOffset === 0 ? 'This Week' : weekOffset === -1 ? 'Last Week' : `${Math.abs(weekOffset)} weeks ago`;
  const rangeStr = `${(weekStart.getMonth()+1)}/${weekStart.getDate()} – ${(weekEnd.getMonth()+1)}/${weekEnd.getDate()}`;

  // Collect daily data for the week
  const dayKeys = ['mon','tue','wed','thu','fri','sat','sun'];
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    const dateStr = d.toISOString().slice(0, 10);
    const log = metrics.dailyLogs[dateStr] || {};
    const weight = metrics.weights.find(w => w.date === dateStr);
    days.push({
      dateStr,
      dayKey: dayKeys[i],
      shortLabel: ['M','T','W','T','F','S','S'][i],
      calories: log.calories ? parseInt(log.calories) : null,
      protein: log.protein ? parseInt(log.protein) : null,
      drinks: log.drinks || 0,
      weight: weight ? weight.weight : null,
    });
  }

  // Stats
  const totalDrinks = days.reduce((s, d) => s + (d.drinks || 0), 0);
  const loggedCaloriesDays = days.filter(d => d.calories != null);
  const avgCalories = loggedCaloriesDays.length > 0 ?
    Math.round(loggedCaloriesDays.reduce((s, d) => s + d.calories, 0) / loggedCaloriesDays.length) : null;
  const loggedProteinDays = days.filter(d => d.protein != null);
  const avgProtein = loggedProteinDays.length > 0 ?
    Math.round(loggedProteinDays.reduce((s, d) => s + d.protein, 0) / loggedProteinDays.length) : null;
  const weightDays = days.filter(d => d.weight != null);
  const avgWeight = weightDays.length > 0 ?
    (weightDays.reduce((s, d) => s + d.weight, 0) / weightDays.length).toFixed(1) : null;

  // Workout sessions completed (check state for lift days)
  const liftDays = ['mon', 'wed', 'fri'];
  let workoutsCompleted = 0;
  liftDays.forEach(dk => {
    // Check if any exercise done on that day in state
    if (state[dk]) {
      const hasDone = Object.values(state[dk]).some(v => v.done);
      if (hasDone) workoutsCompleted++;
    }
  });

  // Ceiling: Sat/Sun calories vs 2600
  const weekendDays = days.filter(d => d.dayKey === 'sat' || d.dayKey === 'sun');
  const ceilingBreaches = weekendDays.filter(d => d.calories != null && d.calories > 2600).length;

  // Day bars: show if workout done + drinks
  const dayBarsHtml = days.map(d => {
    const isLift = liftDays.includes(d.dayKey);
    const hasWorkout = isLift && state[d.dayKey] && Object.values(state[d.dayKey]).some(v => v.done);
    return `
      <div class="day-bar ${hasWorkout ? 'workout-done' : ''} ${isLift && !hasWorkout && weekOffset < 0 ? 'skipped' : ''}">
        <div class="d">${d.shortLabel}</div>
        <div class="v">${d.drinks || 0}</div>
        <div class="u">drinks</div>
      </div>
    `;
  }).join('');

  container.innerHTML = `
    <div class="week-hero">
      <div class="week-label">${weekLabel}</div>
      <div class="week-title">${rangeStr}</div>
      <div class="week-nav">
        <button class="btn" onclick="shiftWeek(-1)">← Prev</button>
        ${weekOffset !== 0 ? `<button class="btn" onclick="shiftWeek(0)">This Week</button>` : ''}
        <button class="btn" onclick="shiftWeek(1)" ${weekOffset >= 0 ? 'disabled style="opacity:0.4;"' : ''}>Next →</button>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="label">Workouts</div>
        <div class="value">${workoutsCompleted}<span style="font-size:14px;color:var(--fg-muted);">/3</span></div>
        <div class="detail">Mon / Wed / Fri target</div>
      </div>
      <div class="stat-card">
        <div class="label">Drinks</div>
        <div class="value">${totalDrinks}</div>
        <div class="detail">Fri/Sat only</div>
      </div>
      <div class="stat-card">
        <div class="label">Avg Calories</div>
        <div class="value">${avgCalories != null ? avgCalories : '–'}</div>
        <div class="detail">${loggedCaloriesDays.length}/7 days logged</div>
      </div>
      <div class="stat-card">
        <div class="label">Avg Protein</div>
        <div class="value">${avgProtein != null ? avgProtein + 'g' : '–'}</div>
        <div class="detail">Target: 180g+</div>
      </div>
      <div class="stat-card">
        <div class="label">Weekend Ceiling</div>
        <div class="value">${ceilingBreaches}</div>
        <div class="detail ${ceilingBreaches === 0 ? 'good' : 'bad'}">${ceilingBreaches === 0 ? 'Held' : 'breach(es) over 2,600'}</div>
      </div>
      <div class="stat-card">
        <div class="label">Avg Weight</div>
        <div class="value">${avgWeight != null ? avgWeight : '–'}</div>
        <div class="detail">${weightDays.length}/7 days logged</div>
      </div>
    </div>

    <div class="metrics-card" style="margin-top:14px;">
      <h3 style="font-size:14px;margin-bottom:6px;">Daily Breakdown</h3>
      <div class="day-bars">${dayBarsHtml}</div>
    </div>
  `;
}

function shiftWeek(dir) {
  if (dir === 0) weekOffset = 0;
  else weekOffset += dir;
  if (weekOffset > 0) weekOffset = 0;
  renderWeekly();
}

loadState();
loadMetrics();
renderAll();
attachTabHandlers();
</script>
